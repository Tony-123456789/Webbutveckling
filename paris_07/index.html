<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=La+Belle+Aurore&family=Noto+Sans+KR:wght@100..900&display=swap');    
    
    body{
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        margin: 15px 300px 100px 300px;
        grid-template-areas:
        "arc kvinna eifel"
        "baget . flaga"
        "pyramid plan gata"
        "hus text1 text1"
        "tempel text1 text1"
        ;
    }

    section{
            height: 25vh;
            background-size: 100%;
            background-size: cover;
    }

    #arc{
        grid-area: arc;
        background-image: url(Images/a.jpg);
        background-size: cover;
    }

    #kvinna{
        grid-area: kvinna;
        background-image: url(Images/b.webp);
        background-size: cover;
    }

    #eifel{
        grid-area: eifel;
        background-image: url(Images/c.jpg);
        background-size: cover;
        border-top-right-radius: 25px;
    }

    #baget{
        grid-area: baget;
        background-image: url(Images/d.jpg);
        background-size: cover;
    }

    #flaga{
        grid-area: flaga;
        background-image: url(Images/e.jpg);
        background-size: cover;
    }

    #pyramid{
        grid-area: pyramid;
        background-image: url(Images/f.jpg);
        background-size: cover;
    }
    
    #plan{
        grid-area: plan;
        background-image: url(Images/g.webp);
        background-size: cover;
    }
    
    #gata{
        grid-area: gata;
        background-image: url(Images/h.jpg);
        background-size: cover;
        border-bottom-right-radius: 25px;
    }
    
    #hus{
        grid-area: hus;
        background-image: url(Images/i.jpg);
        background-size: cover;
    }
    
    #tempel{
        grid-area: tempel;
        background-image: url(Images/j.jpg);
        background-size: cover;
    }

    #text1{
        grid-area: text1;
        
    }

    p{
        font-family: "La Belle Aurore", cursive;
        font-size: 75px;
        margin-left: 75px;
    }
    
</style>
<body>
    <section id="arc">
        
    </section>

    <section id="kvinna">

    </section>

    <section id="eifel">
        
    </section>

    <section id="baget">
        
    </section>

    <section id="flaga">
        
    </section>

    <section id="pyramid">
        
    </section>

    <section id="plan">
        
    </section>

    <section id="gata">
        
    </section>

    <section id="hus">
        
    </section>

    <section id="tempel">
        
    </section>

    <section id="text1">
        <p>Paris is always <br>a good idea</p>
    </section>
</body>
</html>
